name: Smoke tests

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0"
          python -m pip install "git+https://github.com/LYang910920/network-control-differential-games.git"
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run smoke tests
        run: bash scripts/run_smoke_tests.sh
      - name: Generate figures
        run: python scripts/generate_figures.py
